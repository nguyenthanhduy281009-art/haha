<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thư viện Media</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; }
        
        /* Gallery */
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .media-card { position: relative; border-radius: 8px; overflow: hidden; background: #000; cursor: grab; }
        .media-card:active { cursor: grabbing; }
        .media-card img, .media-card video { width: 100%; height: 200px; object-fit: cover; display: block; pointer-events: none; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; overflow: hidden; }
        
        /* Container xử lý Zoom/Pan */
        #zoomContainer { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; transform-origin: center; cursor: grab; }
        #zoomContainer:active { cursor: grabbing; }
        /* QUAN TRỌNG: Ngăn trình duyệt kéo ảnh thay vì di chuyển (Pan) */
        #zoomContainer img, #zoomContainer video { pointer-events: none; }

        /* Controls */
        .controls-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2000; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .controls-layer.visible { opacity: 1; }
        .nav-btn, .close-modal { position: absolute; z-index: 2001; background: rgba(255, 255, 255, 0.2); color: white; border: none; padding: 15px 20px; border-radius: 50%; cursor: pointer; pointer-events: auto; }
        .nav-btn { top: 50%; transform: translateY(-50%); }
        .close-modal { top: 20px; right: 30px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h2>Thư viện</h2></div>
    <div class="gallery" id="gallery"></div>
</div>

<div id="mediaModal" class="modal">
    <div class="controls-layer" id="controlsLayer">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <button class="nav-btn prev-btn" style="left:20px" onclick="changeMedia(-1)">&#10094;</button>
        <button class="nav-btn next-btn" style="right:20px" onclick="changeMedia(1)">&#10095;</button>
    </div>
    <div id="modalViewer" style="width: 100%; height: 100%;"></div>
</div>

<script>
    let scale = 1, posX = 0, posY = 0, isDragging = false, startX, startY;
    let hideTimeout;
    
    // --- FIX 1: Ẩn hiện UI ---
    const modal = document.getElementById("mediaModal");
    const controls = document.getElementById("controlsLayer");

    modal.onmousemove = () => {
        controls.classList.add("visible");
        clearTimeout(hideTimeout);
        // Sau 2 giây không di chuyển chuột, ẩn đi
        hideTimeout = setTimeout(() => controls.classList.remove("visible"), 2000);
    };
    
    modal.onmouseleave = () => controls.classList.remove("visible"); // Rời chuột khỏi modal là ẩn ngay

    function openModalAtIndex(index) {
        scale = 1; posX = 0; posY = 0;
        const viewer = document.getElementById("modalViewer");
        const item = mediaList[index];
        
        viewer.innerHTML = `<div id="zoomContainer">${item.type.includes("image") ? `<img src="${item.url}" style="max-width: 90vw; max-height: 90vh;">` : `<video src="${item.url}" style="max-width: 90vw; max-height: 90vh;" controls autoplay></video>`}</div>`;
        modal.style.display = "flex";

        const container = document.getElementById("zoomContainer");
        container.style.transform = `scale(1) translate(0px, 0px)`;

        // --- FIX 2: Pan (Di chuyển) ---
        container.onmousedown = (e) => {
            isDragging = true;
            startX = e.clientX - posX; 
            startY = e.clientY - posY;
        };
    }

    // Sự kiện toàn màn hình để mượt mà khi di chuyển (Pan)
    window.onmousemove = (e) => {
        if (!isDragging) return;
        posX = e.clientX - startX;
        posY = e.clientY - startY;
        const container = document.getElementById("zoomContainer");
        if(container) container.style.transform = `scale(${scale}) translate(${posX}px, ${posY}px)`;
    };
    window.onmouseup = () => isDragging = false;

    // Zoom
    modal.onwheel = (e) => {
        const container = document.getElementById("zoomContainer");
        if(!container) return;
        e.preventDefault();
        scale = Math.min(Math.max(0.5, scale + (e.deltaY < 0 ? 0.2 : -0.2)), 3);
        container.style.transform = `scale(${scale}) translate(${posX}px, ${posY}px)`;
    };

    // --- FIX 3: Kéo thả sắp xếp ---
    function renderGallery() {
        const gallery = document.getElementById("gallery");
        gallery.innerHTML = "";
        mediaList.forEach((item, index) => {
            const div = document.createElement("div");
            div.className = "media-card";
            div.draggable = true;
            div.innerHTML = `<img src="${item.url}" style="${item.type.includes('video') ? 'filter: brightness(0.5)' : ''}">`;
            
            div.ondragstart = (e) => {
                e.dataTransfer.setData("text/plain", index);
                div.style.opacity = "0.5";
            };
            div.ondragend = () => div.style.opacity = "1";
            div.ondragover = (e) => e.preventDefault();
            div.ondrop = (e) => {
                e.preventDefault();
                const fromIndex = e.dataTransfer.getData("text/plain");
                const movedItem = mediaList.splice(fromIndex, 1)[0];
                mediaList.splice(index, 0, movedItem);
                renderGallery(); // Vẽ lại sau khi đổi chỗ
            };
            div.onclick = () => openModalAtIndex(index);
            gallery.appendChild(div);
        });
    }

    function closeModal() { modal.style.display = "none"; }
</script>
</body>
</html>
