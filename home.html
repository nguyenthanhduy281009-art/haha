<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thư viện Media</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        
        button { padding: 10px 15px; background: #e94560; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #d03b54; }
        input[type="file"] { padding: 8px; border: 1px solid #ddd; border-radius: 8px; }
        #status { color: #e94560; font-size: 14px; margin-left: 10px; font-weight: bold; }

        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .media-card { position: relative; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); background: #000; cursor: pointer; }
        .media-card img, .media-card video { width: 100%; height: 200px; object-fit: cover; display: block; transition: transform 0.3s; }
        .media-card:hover img { transform: scale(1.05); }
        
        .delete-btn { position: absolute; top: 8px; right: 8px; background: rgba(255, 0, 0, 0.8); color: white; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; z-index: 10; display: none; }
        .media-card:hover .delete-btn { display: block; }

        /* Giao diện phóng to xem ảnh và video */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; user-select: none; }
        .modal-content { max-width: 85%; max-height: 85%; border-radius: 8px; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        .close-modal { position: absolute; top: 20px; right: 30px; color: #fff; font-size: 40px; cursor: pointer; font-weight: bold; transition: 0.2s; z-index: 1010; }
        .close-modal:hover { color: #e94560; }

        /* Nút mũi tên chuyển ảnh */
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255, 255, 255, 0.15); color: white; border: none; font-size: 35px; padding: 15px 20px; border-radius: 50%; cursor: pointer; transition: 0.3s; z-index: 1010; }
        .nav-btn:hover { background: rgba(233, 69, 96, 0.8); }
        .prev-btn { left: 30px; }
        .next-btn { right: 30px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Thư viện của bạn</h2>
        <button onclick="firebase.auth().signOut()">Đăng xuất</button>
    </div>

    <div>
        <input type="file" id="fileInput" accept="image/*,video/*">
        <button onclick="uploadFile()">Tải lên</button>
        <span id="status"></span>
    </div>

    <div class="gallery" id="gallery"></div>
</div>

<div id="mediaModal" class="modal">
    <span class="close-modal" onclick="closeModal()">&times;</span>
    <button class="nav-btn prev-btn" onclick="changeMedia(-1)">&#10094;</button>
    <div id="modalViewer" style="display: flex; justify-content: center; align-items: center; width: 100%; height: 100%;"></div>
    <button class="nav-btn next-btn" onclick="changeMedia(1)">&#10095;</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCmLLI3wHywsLB33QmJDSgUzQcfS3GJgso",
        authDomain: "haha-ba0bc.firebaseapp.com",
        projectId: "haha-ba0bc",
        storageBucket: "haha-ba0bc.firebasestorage.app",
        messagingSenderId: "748739861694",
        appId: "1:748739861694:web:492d2a164fec150840d2ef",
        measurementId: "G-DFQ8DYRZ1G",
        databaseURL: "https://haha-ba0bc-default-rtdb.asia-southeast1.firebasedatabase.app"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

    let currentUser = null;
    let mediaList = []; // Mảng danh sách để quản lý thứ tự hình ảnh/video khi lướt xem
    let currentMediaIndex = -1; // Vị trí file đang mở phóng to

    firebase.auth().onAuthStateChanged((user) => {
        if (user) {
            currentUser = user;
            loadMedia();
        } else {
            window.location.href = "index.html";
        }
    });

    function uploadFile() {
        const file = document.getElementById("fileInput").files[0];
        const statusTxt = document.getElementById("status");
        
        if (!file) return statusTxt.innerText = "Vui lòng chọn file!";
        
        if (file.size > 7 * 1024 * 1024) {
            return statusTxt.innerText = "File quá lớn! Hãy chọn file dưới 7MB.";
        }

        statusTxt.innerText = "Đang xử lý và tải lên...";

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = async function () {
            const base64Data = reader.result;

            try {
                await firebase.database().ref(`media/${currentUser.uid}`).push({
                    url: base64Data,
                    type: file.type
                });

                statusTxt.innerText = "Tải lên thành công!";
                document.getElementById("fileInput").value = "";
                setTimeout(() => statusTxt.innerText = "", 3000);
            } catch (e) {
                statusTxt.innerText = "Lỗi: " + e.message;
            }
        };
        reader.onerror = function () {
            statusTxt.innerText = "Lỗi khi đọc file!";
        };
    }

    function loadMedia() {
        firebase.database().ref(`media/${currentUser.uid}`).on("value", (snapshot) => {
            const gallery = document.getElementById("gallery");
            gallery.innerHTML = "";
            mediaList = []; // Xóa danh sách cũ đi để cập nhật lại từ đầu
            
            snapshot.forEach((childSnapshot) => {
                const key = childSnapshot.key;
                const data = childSnapshot.val();
                
                // Thêm dữ liệu vào mảng tạm phục vụ tính năng lướt chuyển tiếp
                mediaList.unshift({ key: key, url: data.url, type: data.type });

                const div = document.createElement("div");
                div.className = "media-card";
                
                let mediaElement = "";
                if (data.type.includes("image")) {
                    mediaElement = `<img src="${data.url}">`;
                } else if (data.type.includes("video")) {
                    mediaElement = `<video src="${data.url}"></video>`;
                }
                
                // Gán sự kiện click vào thẻ bọc ngoài cùng để mở đúng vị trí trong mảng
                div.setAttribute("onclick", `openModalAtIndex(0)`); 
                
                div.innerHTML = `
                    ${mediaElement}
                    <button class="delete-btn" onclick="event.stopPropagation(); deleteFile('${key}')">Xóa</button>
                `;
                gallery.prepend(div);
            });

            // Cập nhật lại chính xác chỉ số index cho từng thẻ sau khi sắp xếp danh sách ngược (mới nhất lên đầu)
            const cards = gallery.querySelectorAll('.media-card');
            cards.forEach((card, index) => {
                card.setAttribute("onclick", `openModalAtIndex(${index})`);
            });
        });
    }

    async function deleteFile(dbKey) {
        if (!confirm("Bạn có chắc chắn muốn xóa tệp này?")) return;
        try {
            await firebase.database().ref(`media/${currentUser.uid}/${dbKey}`).remove();
        } catch (e) {
            alert("Lỗi khi xóa: " + e.message);
        }
    }

    // Mở khung xem ở vị trí index bất kỳ trong mảng
    function openModalAtIndex(index) {
        if (index < 0 || index >= mediaList.length) return;
        
        currentMediaIndex = index;
        const modal = document.getElementById("mediaModal");
        const viewer = document.getElementById("modalViewer");
        const item = mediaList[index];
        
        if (item.type.includes("image")) {
            viewer.innerHTML = `<img src="${item.url}" class="modal-content">`;
        } else if (item.type.includes("video")) {
            viewer.innerHTML = `<video src="${item.url}" class="modal-content" controls autoplay></video>`;
        }
        
        modal.style.display = "flex";
    }

    // Chuyển ảnh qua lại (tiến +1 hoặc lùi -1)
    function changeMedia(direction) {
        let newIndex = currentMediaIndex + direction;
        
        // Tạo vòng lặp vô hạn (nếu hết ảnh thì quay lại từ đầu và ngược lại)
        if (newIndex >= mediaList.length) newIndex = 0;
        if (newIndex < 0) newIndex = mediaList.length - 1;
        
        openModalAtIndex(newIndex);
    }

    function closeModal() {
        const modal = document.getElementById("mediaModal");
        const viewer = document.getElementById("modalViewer");
        modal.style.display = "none";
        viewer.innerHTML = ""; // Xóa nội dung để tắt hẳn tiếng của video
    }

    // Đóng khung xem khi bấm vào vùng nền đen phía sau
    document.getElementById("mediaModal").addEventListener('click', function(e) {
        if (e.target === this || e.target === document.getElementById("modalViewer")) {
            closeModal();
        }
    });

    // Thêm phím mũi tên bàn phím máy tính để điều khiển cho tiện lợi
    document.addEventListener('keydown', function(e) {
        const modal = document.getElementById("mediaModal");
        if (modal.style.display === "flex") {
            if (e.key === "ArrowLeft") changeMedia(-1);
            if (e.key === "ArrowRight") changeMedia(1);
            if (e.key === "Escape") closeModal();
        }
    });
</script>
</body>
</html>
