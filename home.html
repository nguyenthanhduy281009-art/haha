<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thư viện Media</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        button { padding: 10px 15px; background: #e94560; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .media-card { position: relative; border-radius: 8px; overflow: hidden; background: #000; cursor: move; }
        .media-card img, .media-card video { width: 100%; height: 200px; object-fit: cover; display: block; pointer-events: none; }
        
        /* Modal & Zoom/Pan styles */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; overflow: hidden; }
        #zoomWrapper { transform-origin: center; cursor: grab; display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }
        #zoomWrapper:active { cursor: grabbing; }

        /* Nút ẩn hiện thông minh */
        .nav-btn, .close-modal { position: fixed; z-index: 9999; background: rgba(0,0,0,0.3); color: rgba(255,255,255,0.6); border: none; cursor: pointer; opacity: 0; transition: opacity 0.3s; padding: 20px; }
        .nav-btn { top: 50%; transform: translateY(-50%); font-size: 40px; }
        .prev-btn { left: 0; } .next-btn { right: 0; }
        .close-modal { top: 20px; right: 30px; font-size: 40px; }
        #mediaModal:hover .nav-btn, #mediaModal:hover .close-modal { opacity: 0.7; }
        .nav-btn:hover, .close-modal:hover { opacity: 1 !important; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Thư viện của bạn</h2>
        <button onclick="firebase.auth().signOut()">Đăng xuất</button>
    </div>
    <div>
        <input type="file" id="fileInput" accept="image/*,video/*">
        <button onclick="uploadFile()">Tải lên</button>
        <span id="status"></span>
    </div>
    <div class="gallery" id="gallery"></div>
</div>

<div id="mediaModal" class="modal">
    <span class="close-modal" onclick="closeModal()">&times;</span>
    <button class="nav-btn prev-btn" onclick="changeMedia(-1)">&#10094;</button>
    <div id="modalViewer" style="width: 100%; height: 100%;"></div>
    <button class="nav-btn next-btn" onclick="changeMedia(1)">&#10095;</button>
</div>

<script>
    const firebaseConfig = { /* GIỮ NGUYÊN CẤU HÌNH CỦA BẠN */ };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

    let currentUser = null, mediaList = [], currentMediaIndex = -1;
    let scale = 1, posX = 0, posY = 0, isDragging = false, startX, startY;

    // ... (Giữ nguyên các hàm uploadFile, deleteFile, loadMedia, changeMedia cũ) ...
    // Cập nhật hàm openModal để hỗ trợ Zoom/Pan:
    function openModalAtIndex(index) {
        currentMediaIndex = index; scale = 1; posX = 0; posY = 0;
        const item = mediaList[index];
        const viewer = document.getElementById("modalViewer");
        
        viewer.innerHTML = `
            <div id="zoomWrapper" onwheel="handleZoom(event)" onmousedown="startPan(event)">
                ${item.type.includes("image") ? `<img src="${item.url}" style="max-width: 90vw; max-height: 90vh;">` : `<video src="${item.url}" style="max-width: 90vw; max-height: 90vh;" controls autoplay></video>`}
            </div>
        `;
        document.getElementById("mediaModal").style.display = "flex";
    }

    function handleZoom(e) {
        e.preventDefault();
        scale += e.deltaY * -0.001;
        scale = Math.min(Math.max(0.5, scale), 3);
        document.getElementById("zoomWrapper").style.transform = `scale(${scale}) translate(${posX}px, ${posY}px)`;
    }

    function startPan(e) {
        isDragging = true;
        startX = e.clientX - posX; startY = e.clientY - posY;
    }

    window.onmousemove = (e) => {
        if (!isDragging) return;
        posX = e.clientX - startX; posY = e.clientY - startY;
        document.getElementById("zoomWrapper").style.transform = `scale(${scale}) translate(${posX}px, ${posY}px)`;
    };

    window.onmouseup = () => isDragging = false;

    function closeModal() {
        document.getElementById("mediaModal").style.display = "none";
        document.getElementById("modalViewer").innerHTML = "";
    }
</script>
</body>
</html>
