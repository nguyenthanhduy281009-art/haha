<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thư viện Media</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        button { padding: 10px 15px; background: #e94560; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #d03b54; }
        input[type="file"] { padding: 8px; border: 1px solid #ddd; border-radius: 8px; }
        #status { color: #e94560; font-size: 14px; margin-left: 10px; font-weight: bold; }

        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .media-card { position: relative; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); background: #000; cursor: grab; }
        .media-card img, .media-card video { width: 100%; height: 200px; object-fit: cover; display: block; transition: transform 0.3s; pointer-events: none; }
        .media-card:hover img { transform: scale(1.05); }
        .delete-btn { position: absolute; top: 8px; right: 8px; background: rgba(255, 0, 0, 0.8); color: white; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; z-index: 10; display: none; }
        .media-card:hover .delete-btn { display: block; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; user-select: none; }
        .close-modal { position: absolute; top: 20px; right: 30px; color: #fff; font-size: 40px; cursor: pointer; font-weight: bold; transition: 0.2s; z-index: 1010; }
        .close-modal:hover { color: #e94560; }

        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255, 255, 255, 0.15); color: white; border: none; font-size: 35px; padding: 15px 20px; border-radius: 50%; cursor: pointer; transition: 0.3s; z-index: 1010; opacity: 0; }
        .nav-btn.show { opacity: 1; }
        .prev-btn { left: 30px; }
        .next-btn { right: 30px; }
        
        #modalViewer { width: 100%; height: 100%; overflow: hidden; cursor: grab; display: flex; justify-content: center; align-items: center; }
        /* Xóa pointer-events: none để video controls hoạt động */
        #modalViewer img, #modalViewer video { transition: none; }
        .music-container { position: relative; display: inline-block; }
.music-list { display: none; position: absolute; right: 0; background: white; border: 1px solid #ccc; width: 250px; max-height: 300px; overflow-y: auto; z-index: 100; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-radius: 8px; padding: 10px; }
.music-item { padding: 8px; cursor: pointer; border-bottom: 1px solid #eee; }
.music-item:hover { background: #f9f9f9; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Thư viện của bạn</h2>
        <div class="music-container">
        <button onclick="toggleMusicList()">Nhạc</button>
        <div id="musicList" class="music-list"></div>
    </div>
        <button onclick="firebase.auth().signOut()">Đăng xuất</button>
    </div>
    <audio id="audioPlayer"></audio>
    <div>
    <input type="file" id="fileInput" accept="image/*,video/*,audio/*">
    <button onclick="uploadFile('normal')">Tải ảnh/video</button>
    <button onclick="uploadFile('audio')">Tải Nhạc </button>
    <span id="status"></span>
</div>
    <div class="gallery" id="gallery"></div>
</div>

<div id="mediaModal" class="modal">
    <span class="close-modal" onclick="closeModal()" id="closeX" style="opacity:0">&times;</span>
    <button class="nav-btn prev-btn" id="btnPrev" onclick="changeMedia(-1)">&#10094;</button>
    <div id="modalViewer"></div>
    <button class="nav-btn next-btn" id="btnNext" onclick="changeMedia(1)">&#10095;</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCmLLI3wHywsLB33QmJDSgUzQcfS3GJgso",
        authDomain: "haha-ba0bc.firebaseapp.com",
        projectId: "haha-ba0bc",
        storageBucket: "haha-ba0bc.firebasestorage.app",
        messagingSenderId: "748739861694",
        appId: "1:748739861694:web:492d2a164fec150840d2ef",
        measurementId: "G-DFQ8DYRZ1G",
        databaseURL: "https://haha-ba0bc-default-rtdb.asia-southeast1.firebasedatabase.app"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

    let currentUser = null;
    let mediaList = [];
    let currentMediaIndex = -1;
    let scale = 1, posX = 0, posY = 0, isDragging = false, startX, startY;
    let hideTimer;

    firebase.auth().onAuthStateChanged((user) => {
        if (user) { currentUser = user; loadMedia(); }
        else { window.location.href = "index.html"; }
    });

    let currentAudio = new Audio();
let audioList = [];

// Bấm nút Nhạc để hiện/ẩn danh sách
function toggleMusicList() {
    const list = document.getElementById("musicList");
    list.style.display = list.style.display === "block" ? "none" : "block";
    loadAudioFiles();
}

// Lọc nhạc từ mediaList (chỉ lấy file có type là audio)
// Thay thế hàm loadAudioFiles cũ bằng đoạn này
function loadAudioFiles() {
    const listDiv = document.getElementById("musicList");
    listDiv.innerHTML = "";
    
    // Chỉ lấy những file có mode là 'audio'
    audioList = mediaList.filter(item => item.mode === 'audio');
    
    audioList.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "music-item";
        div.style.display = "flex";
        div.style.justifyContent = "space-between";
        div.style.alignItems = "center";
        
        // Tạo HTML bao gồm tên bài và nút xóa
        div.innerHTML = `
            <span onclick="playAudio(${mediaList.indexOf(item)})" style="cursor:pointer; flex-grow:1;">
                🎵 Nhạc ${index + 1}
            </span>
            <button onclick="event.stopPropagation(); deleteFile('${item.key}')" 
                    style="background:#ff4d4d; color:white; border:none; padding:3px 8px; border-radius:4px; font-size:12px; cursor:pointer;">
                Xóa
            </button>
        `;
        listDiv.appendChild(div);
    });
}
function playAudio(index) {
    if (currentAudio.src === audioList[index].url && !currentAudio.paused) {
        currentAudio.pause(); // Bấm lại để dừng
    } else {
        currentAudio.src = audioList[index].url;
        currentAudio.play();
    }
}

// Phát liên tục (tự động chuyển bài)
currentAudio.onended = () => {
    let nextIndex = audioList.findIndex(a => a.url === currentAudio.src) + 1;
    if (nextIndex < audioList.length) playAudio(nextIndex);
};

    // Thay thế hàm uploadFile cũ bằng hàm này
function uploadFile(mode) {
    const fileInput = document.getElementById("fileInput");
    const file = fileInput.files[0];
    const statusTxt = document.getElementById("status");

    if (!file) return alert("Chọn file đi bạn!");
    statusTxt.innerText = "Đang xử lý...";

    const reader = new FileReader();
    reader.onload = () => {
        // Lưu thẳng vào Firebase với mode bạn đã chọn
        firebase.database().ref(`media/${currentUser.uid}`).push({
            url: reader.result,
            type: file.type,
            mode: mode, // Nếu nút 'Tải lên thường' thì mode='normal', nút 'Tải Nhạc' thì mode='audio'
            createdAt: Date.now()
        }).then(() => {
            statusTxt.innerText = "Tải lên thành công!";
            fileInput.value = "";
            setTimeout(() => statusTxt.innerText = "", 2000);
        });
    };
    reader.readAsDataURL(file);
}

    function loadMedia() {
        firebase.database().ref(`media/${currentUser.uid}`).on("value", (snapshot) => {
            const gallery = document.getElementById("gallery");
            gallery.innerHTML = "";
            mediaList = [];
            snapshot.forEach((childSnapshot) => {
                const data = childSnapshot.val();
                mediaList.unshift({ key: childSnapshot.key, url: data.url, type: data.type });
            });
            renderGallery();
        });
    }

    function renderGallery() {
    const gallery = document.getElementById("gallery");
    gallery.innerHTML = "";
    
    // CHỈ LẤY CÁC FILE CÓ MODE LÀ 'normal'
    const displayList = mediaList.filter(item => item.mode === 'normal');

    displayList.forEach((item) => {
        const index = mediaList.indexOf(item); 
        const div = document.createElement("div");
        div.className = "media-card";
        div.draggable = true;
        
        div.innerHTML = item.type.includes("image") ? `<img src="${item.url}">` : `<video src="${item.url}"></video>`;
        div.innerHTML += `<button class="delete-btn" onclick="event.stopPropagation(); deleteFile('${item.key}')">Xóa</button>`;
        div.onclick = () => openModalAtIndex(index);
        
        // ... (Giữ nguyên logic drag & drop cũ) ...
        gallery.appendChild(div);
    });
}
    function openModalAtIndex(index) {
    currentMediaIndex = index; scale = 1; posX = 0; posY = 0;
    const modal = document.getElementById("mediaModal");
    const viewer = document.getElementById("modalViewer");
    const item = mediaList[index];
    
    // 1. Kiểm tra mode, ưu tiên xử lý audio
    // Nếu item.mode là 'audio', dùng thẻ audio. Nếu không thì dùng hình/video cũ
    if (item.mode === 'audio') {
        viewer.innerHTML = `<div style="display:flex; justify-content:center; align-items:center; width:100%"><audio src="${item.url}" controls autoplay></audio></div>`;
    } else {
        const baseStyle = 'max-width: 100vw; max-height: 100vh; object-fit: contain; cursor: grab;';
        viewer.innerHTML = item.type.includes("image") ? 
            `<img src="${item.url}" id="viewEl" style="${baseStyle}">` : 
            `<video src="${item.url}" id="viewEl" controls autoplay loop style="${baseStyle}"></video>`;
    }
    
    modal.style.display = "flex";

    // 2. Chỉ khởi tạo sự kiện kéo thả nếu KHÔNG PHẢI là audio (vì audio không cần kéo)
    if (item.mode !== 'audio') {
        const viewEl = document.getElementById("viewEl");
        viewEl.style.transform = `scale(1) translate(0px, 0px)`;
        
        viewer.onmousedown = (e) => { 
            e.preventDefault(); 
            isDragging = true; startX = e.clientX - posX; startY = e.clientY - posY; 
        };
        // Các sự kiện window cần được gắn vào trong phạm vi này hoặc quản lý cẩn thận
        window.onmousemove = (e) => {
            if(isDragging) {
                posX = e.clientX - startX; posY = e.clientY - startY;
                viewEl.style.transform = `scale(${scale}) translate(${posX}px, ${posY}px)`;
            }
            showUI();
        };
        window.onmouseup = () => isDragging = false;
        
        viewer.onwheel = (e) => {
            e.preventDefault();
            scale += e.deltaY * -0.001;
            scale = Math.min(Math.max(0.5, scale), 3);
            viewEl.style.transform = `scale(${scale}) translate(${posX}px, ${posY}px)`;
        };
    }
}
    function showUI() {
        document.getElementById("btnPrev").classList.add("show");
        document.getElementById("btnNext").classList.add("show");
        document.getElementById("closeX").style.opacity = 1;
        clearTimeout(hideTimer);
        hideTimer = setTimeout(() => {
            document.getElementById("btnPrev").classList.remove("show");
            document.getElementById("btnNext").classList.remove("show");
            document.getElementById("closeX").style.opacity = 0;
        }, 300);
    }

    function changeMedia(dir) {
        currentMediaIndex += dir;
        if (currentMediaIndex >= mediaList.length) currentMediaIndex = 0;
        if (currentMediaIndex < 0) currentMediaIndex = mediaList.length - 1;
        openModalAtIndex(currentMediaIndex);
    }

    function closeModal() { document.getElementById("mediaModal").style.display = "none"; }

    async function deleteFile(dbKey) {
    if (!confirm("Bạn có chắc chắn muốn xóa không?")) return;

    try {
        await firebase.database()
            .ref(`media/${currentUser.uid}/${dbKey}`)
            .remove();

        console.log("Đã xóa");
    } catch (err) {
        alert("Lỗi khi xóa: " + err.message);
        console.error(err);
    }
}
</script>
</body>
</html>
